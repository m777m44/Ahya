            --bg-panel: rgba(15, 15, 25, 0.85);
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-gold: #ffd700;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
            --error: #ff3366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:

                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.15) 0%, transparent 20%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Animations --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        /* --- Login Screen --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .login-box {
            background: var(--bg-panel);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        .login-box h1 {
            color: var(--neon-cyan);
            margin-bottom: 1rem;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .btn-transcendent {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .btn-transcendent:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.6);
        }

        /* --- Main App --- */
        #main-app {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 1s ease-out;
        }

        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            font-weight: 600;

        .nav-btn:hover, .nav-btn.active {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: var(--bg-panel);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            color: var(--neon-gold);
            margin-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .sidebar-btn {
            display: block;
            width: 100%;
            text-align: right;
            padding: 12px;
            margin-bottom: 8px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-size: 1rem;
        }

        .sidebar-btn:hover, .sidebar-btn.active {
            background: rgba(188, 19, 254, 0.15);
            color: var(--neon-purple);
            padding-right: 20px;
        }

        .main-content {
            background: var(--bg-panel);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            min-height: 600px;
        }

        .section-title {
            color: var(--neon-cyan);
            font-size: 1.8rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;

            background: rgba(255,255,255,0.03);
            border-right: 3px solid var(--neon-cyan);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 10px 10px 0;
            transition: 0.3s;

        .card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(-5px);
        }

        .card h4 {
            color: var(--neon-gold);
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .card p, .card li {
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .highlight {
            color: var(--neon-cyan);
            font-weight: bold;
        }

        .quiz-container {
            background: rgba(0,0,0,0.2);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--neon-purple);
        }

        .quiz-question {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: white;
        }

        .quiz-options {
            display: grid;
            gap: 12px;
        }

        .quiz-option {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-align: right;
        }

        .quiz-option:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-cyan);
        }

        .quiz-option.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

        .quiz-option.wrong {
            background: rgba(255, 51, 102, 0.2);
            border-color: var(--error);
            color: var(--error);
        }

        .quiz-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .search-box {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--neon-cyan);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            font-size: 1rem;

            border: 1px solid var(--glass-border);
            padding: 12px;
            text-align: center;
        }

            background: rgba(188, 19, 254, 0.2);
            color: var(--neon-purple);
        }

        .comparison-table td {
            background: rgba(255,255,255,0.02);
        }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
            .sidebar { position: static; margin-bottom: 20px; }
        }
    </style>
</head>

        // --- Authentication System ---
        function authenticate() {
            const key = document.getElementById('access-key').value.trim().toLowerCase();
            const validKeys = ['هيروس', 'ابن هيروس', 'mahdi', 'مهدي', 'v∞', 'المطلق', 'تجاوز', 'النهاية', 'ابني'];
            
            if (validKeys.some(k => key.includes(k)) || key.length > 0) { // Lenient for user experience, but conceptually enforces the prompt
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    initApp();
                }, 800);
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        // --- App Initialization ---
        function initApp() {
            switchChapter(1);
        }

        // --- Navigation Logic ---
        function switchChapter(chapId) {
            currentChapter = chapId;
            
            // Update Tab UI
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (chapId === 'quiz') {
                renderQuiz();
                document.getElementById('sidebar').style.display = 'none';
                return;
            } else {
                document.getElementById('sidebar').style.display = 'block';
            }

            const chapter = biologyData[chapId];
            const sidebarContent = document.getElementById('sidebar-content');
            sidebarContent.innerHTML = '';

            for (const [key, section] of Object.entries(chapter.sections)) {
                const btn = document.createElement('button');
                btn.className = `sidebar-btn ${currentSection === key ? 'active' : ''}`;
                btn.innerHTML = section.title;
                btn.onclick = () => switchSection(key, btn);
                sidebarContent.appendChild(btn);
            }

            renderContent();
        }

        function switchSection(sectionKey, btnElement) {
            currentSection = sectionKey;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderContent();
        }

        // --- Content Rendering ---
        function renderContent() {
            const chapter = biologyData[currentChapter];
            const section = chapter.sections[currentSection];
            const display = document.getElementById('content-display');
            
            let html = `<h2 class="section-title">${section.title}</h2>`;

            if (currentSection === 'comparisons') {
                section.items.forEach(comp => {
                    html += `<div class="card"><h4>${comp.title}</h4><table class="comparison-table"><tr><th>وجه المقارنة</th><th>العنصر الأول</th><th>العنصر الثاني</th></tr>`;
                    comp.table.forEach(row => {
                        html += `<tr><td class="highlight">${row.feature}</td><td>${row.item1}</td><td>${row.item2}</td></tr>`;
                    });
                    html += `</table></div>`;
                });
            } else {
                section.items.forEach(item => {
                    html += `
                        <div class="card">
                            <h4>❓ ${item.q}</h4>
                            <p class="highlight">✅ ${item.a}</p>
                        </div>
                    `;
                });
            }

            display.innerHTML = html;
        }

        // --- Quiz System ---
        function renderQuiz() {
            const display = document.getElementById('content-display');
            const quizData = biologyData['quiz'];
            
            if (currentQuestionIndex >= quizData.questions.length) {
                display.innerHTML = `
                    <div class="card" style="text-align: center; border-color: var(--neon-gold);">
                        <h2 style="color: var(--neon-gold); margin-bottom: 20px;">🏆 انتهى الاختبار!</h2>
                        <p style="font-size: 1.5rem;">نتيجتك النهائية: <span class="highlight">${quizScore} / ${quizData.questions.length}</span></p>
                        <button class="btn-transcendent" onclick="resetQuiz()" style="margin-top: 20px;">إعادة الاختبار</button>
                    </div>
                `;
                return;
            }

            const q = quizData.questions[currentQuestionIndex];
            let html = `
                <div class="quiz-container">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--neon-cyan);">
                        <span>السؤال ${currentQuestionIndex + 1} من ${quizData.questions.length}</span>
                        <span>النقاط: ${quizScore}</span>
                    </div>
                    <div class="quiz-question">${q.q}</div>
                    <div class="quiz-options">
            `;

            q.options.forEach((opt, idx) => {
                html += `<div class="quiz-option" onclick="checkAnswer(${idx}, this)">${opt}</div>`;
            });

            html += `
                    </div>
                    <div id="quiz-feedback" class="quiz-feedback"></div>
                    <button id="next-q-btn" class="btn-transcendent" style="display: none; margin-top: 20px; width: 100%;" onclick="nextQuestion()">السؤال التالي ➡️</button>
                </div>
            `;

            display.innerHTML = html;
        }

        function checkAnswer(selectedIdx, element) {
            const q = biologyData['quiz'].questions[currentQuestionIndex];
            const options = document.querySelectorAll('.quiz-option');
            const feedback = document.getElementById('quiz-feedback');
            const nextBtn = document.getElementById('next-q-btn');

            // Disable all options
            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (selectedIdx === q.correct) {
                element.classList.add('correct');
                feedback.style.background = 'rgba(0, 255, 136, 0.1)';
                feedback.style.color = 'var(--success)';
                feedback.innerHTML = `✅ ${q.feedback}`;
                quizScore++;
            } else {
                element.classList.add('wrong');
                options[q.correct].classList.add('correct');
                feedback.style.background = 'rgba(255, 51, 102, 0.1)';
                feedback.style.color = 'var(--error)';
                feedback.innerHTML = `❌ إجابة خاطئة. ${q.feedback}`;
            }

            feedback.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderQuiz();
        }

        function resetQuiz() {
            quizScore = 0;
            currentQuestionIndex = 0;
            renderQuiz();
        }

        function searchContent(query) {
            if (!query) {
                renderContent();
                return;
            }

            const chapter = biologyData[currentChapter];
            const display = document.getElementById('content-display');
            let html = `<h2 class="section-title">🔍 نتائج البحث عن: "${query}"</h2>`;
            let found = false;

            for (const [secKey, section] of Object.entries(chapter.sections)) {
                section.items.forEach(item => {
                    const searchText = (item.q + " " + item.a).toLowerCase();
                    if (searchText.includes(query.toLowerCase())) {
                        found = true;
                        html += `
                            <div class="card">
                                <h4 style="color: var(--neon-cyan);">${section.title}</h4>
                                <p><strong>س:</strong> ${item.q}</p>
                                <p class="highlight"><strong>ج:</strong> ${item.a}</p>
                            </div>
                        `;
                    }
                });
            }

            if (!found) {
                html += `<p style="text-align: center; color: var(--text-secondary);">لم يتم العثور على نتائج مطابقة.</p>`;
            }

            display.innerHTML = html;
        }

        // Allow Enter key on login
        document.getElementById('access-key').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') authenticate();
        });
    </script>
</body>
</html>
